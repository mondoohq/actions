name: "Mondoo Terraform State GitHub Action"
description: "Scan HashiCorp Terraform State for misconfigurations with Mondoo"
branding:
  icon: "shield"
  color: "purple"
inputs:
  log-level:
    description: >-
      Sets the log level: error, warn, info, debug, trace (default "info")
    default: info
    required: false
  output:
    description: >-
      Set the output format for scan results: compact, yaml, json, junit, csv, summary, full, report, sarif (default "compact")
    default: compact
    required: false
  output-file:
    description: >-
      Path to write the scan report to. Combine with `output: sarif` to produce a SARIF report you can upload to GitHub code scanning.
    default: results.sarif
    required: false
  path:
    description: Path to the Terraform working directory.
    required: true
  risk-threshold:
    description: >-
      Fail the job (exit status 1) if any risk score is greater than or equal to this value. Risk scores range from 0 to 100, so the default of "101" never fails the job.
    default: "101"
    required: false
  service-account-credentials:
    description: "Base64 encoded service account credentials used to authenticate with Mondoo Platform"
    required: false
runs:
  using: "docker"
  image: "docker://mondoo/cnspec:13"
  args:
    - scan
    - terraform
    - state
    - ${{ inputs.path }}
    - --output
    - ${{ inputs.output }}
    - --risk-threshold
    - ${{ inputs.risk-threshold }}
    - --log-level
    - ${{ inputs.log-level }}
    - --output-target
    - ${{ inputs.output-file }}
  env:
    MONDOO_CONFIG_BASE64: ${{ inputs.service-account-credentials }}
