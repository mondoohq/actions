name: Terraform HCL Scanning Tests
on:
  pull_request:
    paths:
      - "terraform-hcl/**"
      - ".github/test_files/**"
      - ".github/workflows/terraform-hcl.yaml"
  push:
    paths:
      - "terraform-hcl/**"
      - ".github/test_files/**"
      - ".github/workflows/terraform-hcl.yaml"
    branches:
      - "main"
    tags: ["v*.*.*"]

jobs:
  terraform-tests:
    runs-on: ubuntu-latest
    name: Test Terraform scanning
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Scan Terraform HCL
        uses: ./terraform-hcl
        env:
          MONDOO_CONFIG_BASE64: ${{ secrets.MONDOO_SERVICE_ACCOUNT }}
        with:
          path: ./.github/test_files/tf
      - name: Scan Terraform HCL (SARIF)
        uses: ./terraform-hcl
        env:
          MONDOO_CONFIG_BASE64: ${{ secrets.MONDOO_SERVICE_ACCOUNT }}
        with:
          path: ./.github/test_files/tf
          output: sarif
          output-file: results.sarif
      - name: Archive SARIF results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-hcl-report
          path: results.sarif
